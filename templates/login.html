{% extends "base.html" %}

{% block title %}Iniciar Sesión{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-4">
        <div class="card shadow">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="fas fa-chalkboard-teacher fa-4x" style="color: var(--color-principal);"></i>
                    <h2 class="mt-3">GESTTATION</h2>
                    <p class="text-muted">Gestor Integral de Cursos</p>
                </div>
                
                <form method="POST" action="{{ url_for('auth.login') }}">
                    <div class="mb-3">
                        <label for="usuario" class="form-label">Usuario</label>
                        <input type="text" class="form-control" id="usuario" name="usuario" 
                               required autofocus placeholder="admin">
                    </div>
                    
                    <div class="mb-3">
                        <label for="password" class="form-label">Contraseña</label>
                        <input type="password" class="form-control" id="password" name="password" 
                               required placeholder="gesttation2026">
                    </div>
                    
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="fas fa-sign-in-alt"></i> Entrar
                        </button>
                    </div>
                </form>
                
                <hr class="my-4">
                
                <div class="text-center">
                    <small class="text-muted">
                        <strong>Credenciales de prueba:</strong><br>
                        Usuario: admin | Contraseña: gesttation2026
                    </small>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
